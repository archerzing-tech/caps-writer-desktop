name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install numpy websockets

      - name: Build frontend
        run: npx vite build

      - name: Build & Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CapsWriter Desktop ${{ github.ref_name }}"
          releaseBody: |
            ## CapsWriter Desktop ${{ github.ref_name }}

            ### 安装说明
            1. 下载 `CapsWriter-Desktop_*_x64-setup.exe` 运行安装程序
            2. 首次运行需确保已安装 Python 3.10+ 并配置好 pip 依赖
            3. 如需使用 LLM 翻译/润色功能，请在设置中配置 API Key

            ### 更新内容
            详见 [CHANGELOG](https://github.com/archerzing-tech/caps-writer-desktop/blob/main/CHANGELOG.md)
          releaseDraft: true
          prerelease: false
